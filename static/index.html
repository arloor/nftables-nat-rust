<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAT 管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 {
            color: #333;
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: #666;
            font-weight: 500;
        }

        .backend-info {
            color: #666;
            font-weight: 500;
            font-size: 13px;
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 4px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .tabs {
            background: white;
            padding: 0;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab:first-child {
            border-radius: 12px 0 0 0;
        }

        .tab:last-child {
            border-radius: 0 12px 0 0;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: #f8f9fa;
        }

        .tab-content {
            background: white;
            padding: 30px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-content.active {
            display: flex;
        }

        .config-editor {
            margin-bottom: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 100px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', 'SF Mono', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            overflow-x: auto;
            white-space: pre;
        }

        .rules-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            min-height: 100px;
        }

        .rules-display pre {
            margin: 0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', 'SF Mono', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre;
            min-height: 100px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-shrink: 0;
        }

        .config-format {
            display: inline-block;
            padding: 5px 12px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .config-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* 后端设置模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.2s;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            outline: none;
            border-color: #007bff;
        }

        .saved-list {
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: #fff;
        }

        .saved-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .saved-item:last-child {
            border-bottom: none;
        }

        .saved-item:hover {
            background: #f8f9fa;
            padding-left: 18px;
        }

        .saved-item.active {
            background: linear-gradient(90deg, #e7f3ff 0%, #f0f8ff 100%);
            border-left: 4px solid #007bff;
            padding-left: 14px;
            font-weight: 600;
        }

        .saved-item-text {
            flex: 1;
            font-size: 14px;
            color: #2c3e50;
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace;
            font-weight: 500;
            line-height: 1.6;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .saved-item-delete {
            padding: 4px 8px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
            transition: background 0.2s;
        }

        .saved-item-delete:hover {
            background: #c82333;
        }

        .empty-list {
            padding: 30px 20px;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .save-current-button {
            flex: 1;
            padding: 8px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .save-current-button:hover {
            background: #218838;
        }

        .save-current-button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .use-current-button {
            flex: 1;
            padding: 8px;
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .use-current-button:hover {
            background: #138496;
        }

        .current-url {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a1a;
            word-break: break-all;
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace;
            font-weight: 600;
            line-height: 1.7;
            letter-spacing: 0.5px;
            border: 1px solid #dee2e6;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        .modal-button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .modal-button-primary {
            background: #007bff;
            color: white;
        }

        .modal-button-primary:hover {
            background: #0056b3;
        }

        .modal-button-secondary {
            background: #6c757d;
            color: white;
        }

        .modal-button-secondary:hover {
            background: #5a6268;
        }

        .import-export-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .export-button {
            flex: 1;
            padding: 8px;
            background: #6f42c1;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .export-button:hover {
            background: #5a32a3;
        }

        .export-button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .import-button {
            flex: 1;
            padding: 8px;
            background: #fd7e14;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .import-button:hover {
            background: #e96b02;
        }

        .import-preview {
            margin-top: 12px;
            padding: 12px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
        }

        .import-preview-label {
            font-size: 13px;
            font-weight: 600;
            color: #856404;
            margin-bottom: 8px;
        }

        .import-preview-textarea {
            width: 100%;
            height: 100px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            box-sizing: border-box;
        }

        .import-preview-warning {
            margin-top: 8px;
            padding: 8px;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            color: #721c24;
            font-size: 12px;
        }

        .import-preview-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .import-confirm-button {
            flex: 1;
            padding: 8px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .import-confirm-button:hover {
            background: #218838;
        }

        .import-confirm-button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .import-cancel-button {
            flex: 1;
            padding: 8px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .import-cancel-button:hover {
            background: #5a6268;
        }

        .import-status {
            margin-top: 8px;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .import-status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .import-status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        @media (max-width: 768px) {
            body {
                padding: calc(10px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
            }

            .header {
                padding: 14px;
                margin-bottom: 10px;
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            h1 {
                font-size: 22px;
            }

            .user-info {
                align-items: stretch;
                flex-wrap: wrap;
                gap: 8px;
            }

            .backend-info {
                width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .username {
                flex: 1 1 100%;
            }

            .user-info .btn {
                flex: 1 1 0;
                padding: 10px 12px;
                text-align: center;
            }

            .tab {
                padding: 14px 8px;
                font-size: 14px;
            }

            .tab-content {
                padding: 14px;
            }

            .config-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .actions {
                position: sticky;
                bottom: 0;
                margin: 12px -14px -14px;
                padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
                background: white;
                border-top: 1px solid #f0f0f0;
                flex-wrap: wrap;
                z-index: 1;
            }

            .actions .btn {
                flex: 1 1 130px;
                text-align: center;
            }

            .modal-overlay.active {
                align-items: flex-start;
                overflow-y: auto;
                padding: calc(10px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
            }

            .modal-content {
                width: 100%;
                max-height: calc(100dvh - 20px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
                padding: 16px;
            }

            .saved-list {
                max-height: 160px;
            }

            .modal-actions {
                position: sticky;
                bottom: -16px;
                margin: 16px -16px -16px;
                padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
                background: white;
                border-top: 1px solid #f0f0f0;
            }

            .modal-button {
                flex: 1 1 0;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 NAT 管理系统</h1>
            <div class="user-info">
                <span class="backend-info">🌐 <span id="headerBackendUrl">-</span></span>
                <span class="username">👤 <span id="currentUsername">-</span></span>
                <button class="btn btn-secondary" onclick="openBackendModal()">⚙️ 切换后端</button>
                <button class="btn btn-secondary" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('config')">📝 配置管理</div>
            <div class="tab" onclick="switchTab('rules')">📋 规则查看</div>
        </div>

        <div id="configTab" class="tab-content active">
            <div id="alert" class="alert"></div>
            
            <div class="config-header">
                <div class="config-format">
                    配置格式: <span id="configFormat">-</span>
                </div>
                <a href="https://github.com/arloor/nftables-nat-rust/blob/master/README.md#-%E9%85%8D%E7%BD%AE%E8%AF%B4%E6%98%8E" target="_blank" style="color: #1890ff; text-decoration: none; font-size: 14px;">📖 配置说明</a>
            </div>

            <div class="config-editor">
                <textarea id="configEditor" placeholder="加载配置中..."></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
                <button class="btn btn-secondary" onclick="loadConfig()">🔄 重新加载</button>
            </div>
        </div>

        <div id="rulesTab" class="tab-content">
            <div class="actions" style="margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="loadRules()">🔄 刷新规则</button>
            </div>

            <div id="rulesContent" class="loading">
                点击"刷新规则"查看当前 nftables 规则
            </div>
        </div>

    </div>

    <!-- 后端设置模态框 -->
    <div id="backendModal" class="modal-overlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                后端地址设置
            </div>

            <div class="modal-section">
                <label class="modal-label">后端地址</label>
                <input
                    class="modal-input"
                    type="text"
                    id="tempBackendUrl"
                    placeholder="留空使用当前域名，或输入如: https://example.com:5533"
                />
                <div class="button-group">
                    <button class="save-current-button" id="saveToListBtn" onclick="handleSaveToList()">
                        💾 保存此地址到列表
                    </button>
                    <button class="use-current-button" onclick="handleUseCurrent()">
                        🏠 使用当前服务器
                    </button>
                </div>
            </div>

            <div class="modal-section">
                <label class="modal-label">已保存的后端地址</label>
                <div class="saved-list" id="savedBackendList">
                    <div class="empty-list">暂无保存的地址</div>
                </div>
                <div class="import-export-group">
                    <button class="export-button" id="exportBtn" onclick="handleExport()">
                        📤 导出到剪贴板
                    </button>
                    <button class="import-button" onclick="handleImport()">
                        📥 从剪贴板导入
                    </button>
                </div>
                <div id="importStatusDiv"></div>
                <div id="importPreviewDiv"></div>
            </div>

            <div class="modal-section">
                <label class="modal-label">当前请求 URL</label>
                <div class="current-url" id="currentUrlDisplay">-</div>
            </div>

            <div class="modal-actions">
                <button class="modal-button modal-button-secondary" onclick="handleCloseModal()">
                    取消
                </button>
                <button class="modal-button modal-button-primary" onclick="handleSaveBackend()">
                    应用
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentConfig = null;
        let currentFormat = null;

        // 统一的 API 请求函数
        async function apiRequest(endpoint, options = {}) {
            const apiBaseUrl = localStorage.getItem('apiBaseUrl') || '';
            const token = localStorage.getItem('jwtToken');

            const headers = {
                'Content-Type': 'application/json',
                ...options.headers,
            };

            // 优先使用 Authorization header
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            const url = `${apiBaseUrl}${endpoint}`;

            return fetch(url, {
                ...options,
                headers,
            });
        }

        async function checkAuth() {
            try {
                const response = await apiRequest('/api/me');

                if (!response.ok) {
                    window.location.href = '/login.html';
                    return false;
                }

                const data = await response.json();
                document.getElementById('currentUsername').textContent = data.username;
                return true;
            } catch (e) {
                window.location.href = '/login.html';
                return false;
            }
        }

        function showAlert(message, isError = false) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        async function loadConfig() {
            try {
                const response = await apiRequest('/api/config');

                if (!response.ok) {
                    throw new Error('加载配置失败');
                }

                const data = await response.json();
                currentConfig = data.content;
                currentFormat = data.format;

                document.getElementById('configFormat').textContent =
                    data.format === 'toml' ? 'TOML' : '传统格式';

                const editor = document.getElementById('configEditor');
                // 直接显示配置内容（TOML 或 传统格式字符串）
                editor.value = data.content;
            } catch (error) {
                showAlert('加载配置失败: ' + error.message, true);
            }
        }

        async function saveConfig() {
            try {
                const editor = document.getElementById('configEditor');
                // 直接发送编辑器中的内容（字符串）
                const content = editor.value;

                const response = await apiRequest('/api/config', {
                    method: 'POST',
                    body: JSON.stringify({
                        format: currentFormat,
                        content: content
                    })
                });

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text);
                }

                showAlert('配置保存成功！', false);
                await loadConfig();
            } catch (error) {
                showAlert('保存配置失败: ' + error.message, true);
            }
        }

        async function loadRules() {
            const rulesContent = document.getElementById('rulesContent');
            rulesContent.className = 'loading';
            rulesContent.textContent = '加载中...';

            try {
                const response = await apiRequest('/api/rules');

                if (!response.ok) {
                    throw new Error('加载规则失败');
                }

                const data = await response.json();
                rulesContent.className = 'rules-display';
                rulesContent.innerHTML = `<pre>${data.rules}</pre>`;
            } catch (error) {
                rulesContent.className = 'loading';
                rulesContent.textContent = '加载失败: ' + error.message;
            }
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');

            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));

            if (tab === 'config') {
                tabs[0].classList.add('active');
                document.getElementById('configTab').classList.add('active');
            } else if (tab === 'rules') {
                tabs[1].classList.add('active');
                document.getElementById('rulesTab').classList.add('active');
                // 切换到规则页面时自动加载规则
                loadRules();
            }
        }

        async function logout() {
            try {
                await apiRequest('/api/logout', {
                    method: 'POST'
                });
                // 清除本地存储的 token
                localStorage.removeItem('jwtToken');
                window.location.href = '/login.html';
            } catch (e) {
                alert('退出登录失败');
            }
        }

        // 后端管理功能
        const SAVED_BACKENDS_KEY = 'backendList';
        const API_PATH = '/api/config'; // 示例 API 路径
        let importPreviewData = null;

        function loadSavedBackends() {
            try {
                const saved = localStorage.getItem(SAVED_BACKENDS_KEY);
                return saved ? JSON.parse(saved) : [];
            } catch {
                return [];
            }
        }

        function saveSavedBackends(backends) {
            localStorage.setItem(SAVED_BACKENDS_KEY, JSON.stringify(backends));
        }

        function openBackendModal() {
            const apiBaseUrl = localStorage.getItem('apiBaseUrl') || '';
            document.getElementById('tempBackendUrl').value = apiBaseUrl;
            updateCurrentUrlDisplay();
            renderSavedBackendList();
            updateSaveButtonState();
            document.getElementById('backendModal').classList.add('active');
        }

        function handleCloseModal() {
            document.getElementById('backendModal').classList.remove('active');
            clearImportPreview();
        }

        function updateCurrentUrlDisplay() {
            const tempUrl = document.getElementById('tempBackendUrl').value.trim();
            if (tempUrl) {
                const cleanBackend = tempUrl.replace(/\/+$/, '');
                document.getElementById('currentUrlDisplay').textContent = cleanBackend + API_PATH;
            } else {
                // 使用当前服务器时，只显示 API_PATH
                document.getElementById('currentUrlDisplay').textContent = API_PATH;
            }
        }

        function updateSaveButtonState() {
            const tempUrl = document.getElementById('tempBackendUrl').value.trim();
            const savedBackends = loadSavedBackends();
            const saveBtn = document.getElementById('saveToListBtn');
            const isExisting = savedBackends.includes(tempUrl);
            saveBtn.disabled = !tempUrl || isExisting;
        }

        function handleUseCurrent() {
            document.getElementById('tempBackendUrl').value = '';
            updateCurrentUrlDisplay();
            updateSaveButtonState();
        }

        function handleSaveToList() {
            const tempUrl = document.getElementById('tempBackendUrl').value.trim();
            if (!tempUrl) {
                showImportStatus('请输入后端地址', 'error');
                return;
            }
            const savedBackends = loadSavedBackends();
            if (savedBackends.includes(tempUrl)) {
                showImportStatus('该地址已存在', 'error');
                return;
            }
            savedBackends.push(tempUrl);
            saveSavedBackends(savedBackends);
            renderSavedBackendList();
            updateSaveButtonState();
            showImportStatus('已添加到列表', 'success');
        }

        function renderSavedBackendList() {
            const savedBackends = loadSavedBackends();
            const container = document.getElementById('savedBackendList');
            const tempUrl = document.getElementById('tempBackendUrl').value.trim();
            const exportBtn = document.getElementById('exportBtn');

            exportBtn.disabled = savedBackends.length === 0;

            if (savedBackends.length === 0) {
                container.innerHTML = '<div class="empty-list">暂无保存的地址</div>';
            } else {
                container.innerHTML = savedBackends.map(url => `
                    <div class="saved-item ${url === tempUrl ? 'active' : ''}" onclick="handleSelectSaved('${escapeHtml(url)}')">
                        <div class="saved-item-text" title="${escapeHtml(url)}">
                            ${escapeHtml(url) || '当前域名'}
                        </div>
                        <button class="saved-item-delete" onclick="event.stopPropagation(); handleDeleteSaved('${escapeHtml(url)}')">
                            删除
                        </button>
                    </div>
                `).join('');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleSelectSaved(url) {
            document.getElementById('tempBackendUrl').value = url;
            updateCurrentUrlDisplay();
            updateSaveButtonState();
            renderSavedBackendList();
        }

        function handleDeleteSaved(url) {
            const savedBackends = loadSavedBackends();
            const filtered = savedBackends.filter(b => b !== url);
            saveSavedBackends(filtered);
            renderSavedBackendList();
            showImportStatus('已删除', 'success');
        }

        async function handleExport() {
            try {
                const savedBackends = loadSavedBackends();
                const jsonStr = JSON.stringify(savedBackends, null, 2);
                await navigator.clipboard.writeText(jsonStr);
                showImportStatus('已导出到剪贴板！', 'success');
            } catch (err) {
                showImportStatus('导出失败: ' + err.message, 'error');
            }
        }

        async function handleImport() {
            try {
                const text = await navigator.clipboard.readText();
                let parsed = null;
                let error = null;
                try {
                    const data = JSON.parse(text);
                    if (Array.isArray(data) && data.every(item => typeof item === 'string')) {
                        parsed = data;
                    } else {
                        error = '格式错误：需要字符串数组';
                    }
                } catch (e) {
                    error = '解析失败：不是有效的 JSON 格式';
                }
                importPreviewData = { text, parsed, error };
                renderImportPreview();
                clearImportStatus();
            } catch (err) {
                importPreviewData = { text: '', parsed: null, error: '读取剪贴板失败: ' + err.message };
                renderImportPreview();
            }
        }

        function renderImportPreview() {
            if (!importPreviewData) {
                document.getElementById('importPreviewDiv').innerHTML = '';
                return;
            }

            const { text, parsed, error } = importPreviewData;

            let statusHtml = '';
            if (error) {
                statusHtml = `<div class="import-status error">${escapeHtml(error)}</div>`;
            } else if (parsed) {
                statusHtml = `<div class="import-status success">解析成功：共 ${parsed.length} 个地址</div>`;
            }

            document.getElementById('importPreviewDiv').innerHTML = `
                <div class="import-preview">
                    <div class="import-preview-label">导入预览</div>
                    <textarea class="import-preview-textarea" id="importTextarea" placeholder="JSON 格式的后端地址数组">${escapeHtml(text)}</textarea>
                    ${statusHtml}
                    <div class="import-preview-warning">
                        ⚠️ 确认导入将会覆盖当前已保存的所有后端地址！
                    </div>
                    <div class="import-preview-actions">
                        <button class="import-confirm-button" onclick="handleImportConfirm()" ${!parsed ? 'disabled' : ''}>
                            ✅ 确认导入
                        </button>
                        <button class="import-cancel-button" onclick="handleImportCancel()">
                            ❌ 取消
                        </button>
                    </div>
                </div>
            `;

            // 添加实时编辑功能
            const textarea = document.getElementById('importTextarea');
            if (textarea) {
                textarea.addEventListener('input', handleImportTextChange);
            }
        }

        function handleImportTextChange(e) {
            const text = e.target.value;
            let parsed = null;
            let error = null;
            try {
                const data = JSON.parse(text);
                if (Array.isArray(data) && data.every(item => typeof item === 'string')) {
                    parsed = data;
                } else {
                    error = '格式错误：需要字符串数组';
                }
            } catch (e) {
                error = '解析失败：不是有效的 JSON 格式';
            }
            importPreviewData = { text, parsed, error };
            renderImportPreview();
        }

        function handleImportConfirm() {
            if (importPreviewData && importPreviewData.parsed) {
                saveSavedBackends(importPreviewData.parsed);
                renderSavedBackendList();
                showImportStatus('导入成功！已覆盖原有列表。', 'success');
                clearImportPreview();
            }
        }

        function handleImportCancel() {
            clearImportPreview();
        }

        function clearImportPreview() {
            importPreviewData = null;
            document.getElementById('importPreviewDiv').innerHTML = '';
        }

        function showImportStatus(message, type) {
            const statusDiv = document.getElementById('importStatusDiv');
            statusDiv.innerHTML = `<div class="import-status ${type}">${escapeHtml(message)}</div>`;
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 3000);
        }

        function clearImportStatus() {
            document.getElementById('importStatusDiv').innerHTML = '';
        }

        function handleSaveBackend() {
            const url = document.getElementById('tempBackendUrl').value.trim();
            localStorage.setItem('apiBaseUrl', url);
            showAlert('后端已切换，请重新登录', false);
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 1500);
        }

        // 输入框变化时更新 URL 显示和保存按钮状态
        document.addEventListener('DOMContentLoaded', function() {
            const tempUrlInput = document.getElementById('tempBackendUrl');
            if (tempUrlInput) {
                tempUrlInput.addEventListener('input', function() {
                    updateCurrentUrlDisplay();
                    updateSaveButtonState();
                });
            }

            // 点击模态框背景关闭
            const modal = document.getElementById('backendModal');
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        handleCloseModal();
                    }
                });
            }
        });

        function updateHeaderBackend() {
            const apiBaseUrl = localStorage.getItem('apiBaseUrl') || '';
            const backendDisplay = apiBaseUrl || '(当前服务器)';
            document.getElementById('headerBackendUrl').textContent = backendDisplay;
        }

        window.addEventListener('load', async () => {
            updateHeaderBackend();
            if (await checkAuth()) {
                await loadConfig();
            }
        });
    </script>
</body>
</html>
